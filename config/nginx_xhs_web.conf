upstream xhs_web_app {
    server 127.0.0.1:8787;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.example.com;

    client_max_body_size 25m;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location = /healthz {
        proxy_pass http://xhs_web_app/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://xhs_web_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://xhs_web_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
    }
}

# Production HTTPS example:
# 1. Replace `your-domain.example.com` with your real domain.
# 2. Add a second server block listening on 443 with your SSL certificate.
# 3. If the app is behind FRP / Cloudflare Tunnel / another gateway, keep Nginx
#    on the final public node and still forward traffic to 127.0.0.1:8787.
