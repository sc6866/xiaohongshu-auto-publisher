services:
  app:
    image: ${XHS_APP_IMAGE:-xiaohongshu-local:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "0"
    container_name: xiaohongshu-app
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      XHS_WEB_HOST: ${XHS_WEB_HOST:-0.0.0.0}
      XHS_WEB_PORT: ${XHS_WEB_PORT:-8787}
      XHS_WEB_PUBLIC_BASE_URL: ${XHS_WEB_PUBLIC_BASE_URL:-}
      XHS_MCP_BASE_URL: ${XHS_MCP_BASE_URL:-http://host.docker.internal:18090}
      XHS_MCP_AUTO_START: ${XHS_MCP_AUTO_START:-false}
      XHS_PUBLISHER_USER_ID: ${XHS_PUBLISHER_USER_ID:-}
      XHS_PUBLISHER_XSEC_TOKEN: ${XHS_PUBLISHER_XSEC_TOKEN:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY:-}
      BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/settings.yaml:/app/config/settings.yaml
      - ./data:/app/data
      - ./logs:/app/logs

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: xiaohongshu-cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
