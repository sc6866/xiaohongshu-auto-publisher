<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{main_title}}</title>
    <style>
      :root {
        --bg: linear-gradient(180deg, #f3e5d5 0%, #fefbf6 100%);
        --ink: #3a2619;
        --card: rgba(255, 251, 246, 0.92);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 768px;
        height: 1024px;
        font-family: "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .wrap { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .blob {
        position: absolute;
        width: 320px;
        height: 320px;
        right: -40px;
        top: -40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.48);
      }
      .card {
        position: absolute;
        left: 56px;
        top: 88px;
        width: 430px;
        padding: 44px 36px;
        border-radius: 30px;
        background: var(--card);
      }
      h1 { margin: 0; font-size: 58px; line-height: 1.15; letter-spacing: 1px; }
      .sub { margin-top: 22px; font-size: 26px; opacity: 0.9; }
      .line { width: 280px; height: 6px; border-radius: 999px; margin-top: 28px; background: var(--ink); }
      .tags {
        position: absolute;
        right: 56px;
        top: 120px;
        width: 180px;
        display: grid;
        gap: 16px;
      }
      .tags span {
        display: block;
        padding: 10px 18px;
        border-radius: 16px;
        background: rgba(255,255,255,0.8);
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <div class="wrap {{bg_style}}">
      <div class="blob"></div>
      <div class="card">
        <h1>{{main_title}}</h1>
        <div class="sub">{{subtitle}}</div>
        <div class="line"></div>
      </div>
      <div class="tags">{{tags}}</div>
    </div>
  </body>
</html>
