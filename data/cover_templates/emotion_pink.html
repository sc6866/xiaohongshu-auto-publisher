<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{main_title}}</title>
    <style>
      :root {
        --bg: linear-gradient(180deg, #ffd8e8 0%, #fff7fb 100%);
        --ink: #9e4068;
        --card: rgba(255, 250, 252, 0.94);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 768px;
        height: 1024px;
        font-family: "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .glow {
        position: absolute;
        width: 360px;
        height: 360px;
        left: -40px;
        top: -40px;
        border-radius: 50%;
        background: rgba(255,255,255,0.4);
      }
      .card {
        position: absolute;
        left: 62px;
        top: 104px;
        width: 432px;
        padding: 42px 34px;
        border-radius: 30px;
        background: var(--card);
      }
      h1 { margin: 0; font-size: 56px; line-height: 1.16; }
      .sub { margin-top: 20px; font-size: 28px; }
      .tags { position: absolute; right: 50px; top: 126px; width: 182px; display: grid; gap: 16px; }
      .tags span { display: block; padding: 10px 16px; border-radius: 18px; background: rgba(255,255,255,0.82); font-size: 22px; }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="card">
      <h1>{{main_title}}</h1>
      <div class="sub">{{subtitle}}</div>
    </div>
    <div class="tags">{{tags}}</div>
  </body>
</html>
